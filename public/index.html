<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vista — Staff Girişi</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="eyebrow">Cocktail Bar</div>
      <h1 class="display">Vista</h1>
      <form id="loginForm">
        <input type="text" id="staffName" placeholder="Adınız (məs. Elvin)" autocomplete="off" />
        <input type="password" id="password" placeholder="Şifrə" autocomplete="current-password" required />
        <div class="error" id="errorMsg"></div>
        <button type="submit" class="btn btn-primary" style="margin-top: 6px;">Daxil ol</button>
      </form>
    </div>
  </div>
  <script src="/js/login.js"></script>
</body>
</html>
